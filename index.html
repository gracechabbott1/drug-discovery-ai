<!DOCTYPE html>

            const toggleResource = (id) => {

                    [id]: !prev[id]
                }));
            };

                            link: 'https://www.coursera.org/learn/python-data-analysis',
                            notes: 'Pandas, NumPy basics'
                        },
                        {
                            id: 'w1-2',

                            type: 'Blog Post',

                },
                {

                            type: 'Project',
                            time: '5 hours',
                            link: 'https://github.com/topics/drug-discovery-ml',
                            notes: 'Use ChEMBL data, train regression model, evaluate'

                    ]

                    week: 4,

                            notes: 'K-fold, stratified CV'

                            time: '4 hours',

                            type: 'Project',
                            time: '5 hours',
                            link: 'https://www.ebi.ac.uk/chembl/',
                            notes: 'Pull ADMET data, benchmark 5+ algorithms'
                        }

                },
                {
                    week: 7,
                    title: 'Unsupervised Learning & Clustering',
                    description: 'Discover patterns without labels',

                            name: 'K-Means, Hierarchical, DBSCAN (Coursera Plus)',

                            link: 'https://www.coursera.org/learn/machine-learning',

                        {

                            link: 'https://umap-learn.readthedocs.io/',

                            notes: 'Backpropagation, activation functions'
                        },
                        {
                            id: 'w9-3',
                            name: 'Project: Protein Property Prediction (Shallow NN)',
                            type: 'Project',
                            time: '5 hours',
                            link: 'https://github.com/topics/protein-prediction',
                            notes: 'Build 2-3 layer network in PyTorch'
                        }
                    ]
                },
                {
                    week: 10,
                    title: 'Convolutional & Recurrent Networks',
                    description: 'CNNs, RNNs, sequence models',
                    resources: [
                        {
                            id: 'w10-1',
                            name: 'fast.ai Lessons 4-6: CNNs & Architectures',
                            type: 'Video',
                            time: '6 hours',
                            link: 'https://course.fast.ai/',
                            notes: 'ResNet, transfer learning'
                        },
                        {
                            id: 'w10-2',
                            name: 'RNNs & LSTMs for Sequences',
                            type: 'Blog Post',
                            time: '2 hours',
                            link: 'https://colah.github.io/posts/2015-08-Understanding-LSTMs/',
                            notes: 'Understanding sequence models'
                        },
                        {
                            id: 'w10-3',
                            name: 'Project: Predict Molecular Properties with CNN',
                            type: 'Project',
                            time: '5 hours',
                            link: 'https://github.com/topics/deep-learning-molecules',
                            notes: 'Use DeepChem or graph NN library'
                        }
                    ]
                },
                {
                    week: 11,
                    title: 'Attention & Transformers Intro',
                    description: 'Sequence models revolution',
                    resources: [
                        {
                            id: 'w11-1',
                            name: 'Attention Is All You Need (Paper)',
                            type: 'Paper',
                            time: '2 hours',
                            link: 'https://arxiv.org/abs/1706.03762',
                            notes: 'Foundational transformer paper'
                        },
                        {
                            id: 'w11-2',
                            name: 'Illustrated Transformer Blog',
                            type: 'Blog Post',
                            time: '1.5 hours',
                            link: 'https://jalammar.github.io/illustrated-transformer/',
                            notes: 'Visual explanation of transformers'
                        },
                        {
                            id: 'w11-3',
                            name: 'fast.ai Lessons 7-9: NLP & Transformers',
                            type: 'Video',
                            time: '6 hours',
                            link: 'https://course.fast.ai/',
                            notes: 'Practical transformer applications'
                        },
                        {
                            id: 'w11-4',
                            name: 'Project: Fine-tune BERT for Drug-Target Prediction',
                            type: 'Project',
                            time: '5 hours',
                            link: 'https://huggingface.co/docs/transformers/',
                            notes: 'Use Hugging Face, work with sequences'
                        }
                    ]
                },
                {
                    week: 12,
                    title: 'Protein & Molecular Sequence Models',
                    description: 'Specialized models for biology',
                    resources: [
                        {
                            id: 'w12-1',
                            name: 'Protein Folding with AlphaFold2',
                            type: 'Blog Post',
                            time: '1.5 hours',
                            link: 'https://alphafold.ebi.ac.uk/',

                        },
                        {
                            id: 'w12-2',
                            name: 'ESM: Evolution-Scale Protein Language Models',
                            type: 'Paper',
                            time: '1.5 hours',
                            link: 'https://arxiv.org/abs/2102.15807',
                            notes: 'Protein embeddings & representations'
                        },
                        {
                            id: 'w12-3',
                            name: 'RDKit + ML for Small Molecules',
                            type: 'Blog Post',
                            time: '2 hours',
                            link: 'https://www.rdkit.org/docs/',
                            notes: 'Graph neural networks for molecules'
                        },
                        {
                            id: 'w12-4',
                            name: 'Project: Protein-Ligand Interaction Prediction',
                            type: 'Project',
                            time: '6 hours',
                            link: 'https://github.com/topics/protein-ligand',
                            notes: 'Use ESM embeddings + ML to predict binding'

                            id: 'w13-1',
                            name: 'GNN Fundamentals (PyTorch Geometric)',
                            type: 'Blog Post',
                            time: '2 hours',
                            link: 'https://pytorch-geometric.readthedocs.io/',

                        },
                        {
                            id: 'w13-2',
                            name: 'Geometric Deep Learning Paper',
                            type: 'Paper',

                    ]
                },
                {

                            notes: 'Generate SMILES, visualize latent space'
                        }
                    ]
                }
            ];

            const completedCount = Object.values(completedResources).filter(Boolean).length;
            const progressPercent = Math.round((completedCount / totalResources) * 100);

                                                                        href={resource.link}
                                                                        target="_blank"
                                                                        rel="noopener noreferrer"
                                                                        className="text-xs text-indigo-600 hover:text-indigo-700 font-semibold flex items-center gap-1"
                                                                    >
                                                                        Open Link
                                                                        <ExternalLink className="w-3 h-3" />
                                                                    </a>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        <div className="mt-8 bg-white rounded-lg shadow-sm p-5 text-center text-sm text-gray-600">
                            <p className="mb-2">
                                Progress is saved locally in your browser. Use Notion for detailed notes and reflections.
                            </p>
                            <p className="text-xs text-gray-500">
                                Last updated: June 2026 • All resources are free (Coursera Plus valid through Sept 15, 2026)
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DrugDiscoveryAISyllabus />);
    </script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grace's Drug Discovery AI Plan</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
  .fade { transition: all .2s ease; }
</style>
</head>
<body class="bg-slate-50">
<div id="root" class="max-w-3xl mx-auto px-4 py-8"></div>
<script>
const DATA = {"phases": [{"name": "Phase 1 \u2014 Foundations", "weeks": "Weeks 1-2", "desc": "Get Python and data handling solid before any ML."}, {"name": "Phase 2 \u2014 Core Machine Learning", "weeks": "Weeks 3-8", "desc": "Andrew Ng's ML Specialization (all 3 courses), paced realistically with drug-data practice."}, {"name": "Phase 3 \u2014 Deep Learning", "weeks": "Weeks 9-14", "desc": "fast.ai Practical Deep Learning, hands-on and top-down."}, {"name": "Phase 4 \u2014 Biotech Specialization", "weeks": "Weeks 15-18", "desc": "Molecular ML: RDKit, protein models, graph nets, generative models."}], "weeks": [{"week": 1, "phase": 1, "title": "Python & Environment Setup", "description": "Refresh Python and get your tools working. You already know some from JMP/MATLAB/Python, so this is mostly warm-up.", "hours": "8", "resources": [{"id": "w1-1", "name": "Python refresher (Coursera Plus, skim what you know)", "type": "Video", "time": "2.5 hrs", "link": "https://www.coursera.org/learn/python-data-analysis", "notes": "Skip what's familiar; focus on gaps"}, {"id": "w1-2", "name": "Pandas 10-minute intro + practice", "type": "Blog Post", "time": "2 hrs", "link": "https://pandas.pydata.org/docs/user_guide/10min.html", "notes": "Series, DataFrames, indexing"}, {"id": "w1-3", "name": "Set up Jupyter/Colab + explore ChEMBL", "type": "Dataset", "time": "1.5 hrs", "link": "https://www.ebi.ac.uk/chembl/", "notes": "Get a feel for real drug data"}, {"id": "w1-4", "name": "Mini-exercise: load a dataset, basic stats", "type": "Project", "time": "2 hrs", "link": "https://colab.research.google.com/", "notes": "shape, describe, missing values"}]}, {"week": 2, "phase": 1, "title": "Data Wrangling & Visualization", "description": "Clean messy data and make plots. This is 80% of real ML work.", "hours": "8", "resources": [{"id": "w2-1", "name": "Pandas data cleaning (Coursera Plus)", "type": "Video", "time": "3 hrs", "link": "https://www.coursera.org/learn/python-data-analysis", "notes": "Missing data, merging, grouping"}, {"id": "w2-2", "name": "Seaborn tutorial", "type": "Blog Post", "time": "2 hrs", "link": "https://seaborn.pydata.org/tutorial.html", "notes": "Distributions, correlations, heatmaps"}, {"id": "w2-3", "name": "EDA project: explore + visualize a drug dataset", "type": "Project", "time": "3 hrs", "link": "https://pubchem.ncbi.nlm.nih.gov/", "notes": "5+ plots, write 3 observations"}]}, {"week": 3, "phase": 2, "title": "Ng Course 1 \u2014 Regression", "description": "Start the ML Specialization. Course 1, Week 1: linear regression and gradient descent.", "hours": "8", "resources": [{"id": "w3-1", "name": "ML Specialization C1 W1: Linear Regression (Coursera Plus)", "type": "Video", "time": "5 hrs", "link": "https://www.coursera.org/specializations/machine-learning-introduction", "notes": "Includes labs; do them"}, {"id": "w3-2", "name": "Apply: predict a compound property (regression)", "type": "Project", "time": "3 hrs", "link": "https://www.ebi.ac.uk/chembl/", "notes": "Use what you learned on real data"}]}, {"week": 4, "phase": 2, "title": "Ng Course 1 \u2014 Classification", "description": "Course 1, Weeks 2-3: multiple features, logistic regression, regularization.", "hours": "8", "resources": [{"id": "w4-1", "name": "ML Spec C1 W2-3: Classification & Regularization (Coursera Plus)", "type": "Video", "time": "6 hrs", "link": "https://www.coursera.org/specializations/machine-learning-introduction", "notes": "Logistic regression, overfitting"}, {"id": "w4-2", "name": "Apply: drug-like vs not classifier", "type": "Project", "time": "2 hrs", "link": "https://www.rdkit.org/docs/", "notes": "Simple binary classification"}]}, {"week": 5, "phase": 2, "title": "Ng Course 2 \u2014 Neural Networks", "description": "Course 2, Weeks 1-2: neural networks and how they train.", "hours": "8", "resources": [{"id": "w5-1", "name": "ML Spec C2 W1-2: Neural Networks (Coursera Plus)", "type": "Video", "time": "6 hrs", "link": "https://www.coursera.org/specializations/machine-learning-introduction", "notes": "TensorFlow basics, forward prop"}, {"id": "w5-2", "name": "3Blue1Brown: Neural Networks (beach-friendly)", "type": "Video", "time": "2 hrs", "link": "https://www.youtube.com/playlist?list=PLZHQObOWTQDNU6R1_67000Dx_LFPM5gQa", "notes": "Visual intuition for backprop"}]}, {"week": 6, "phase": 2, "title": "Ng Course 2 \u2014 Decision Trees & ML Advice", "description": "Course 2, Weeks 3-4: practical advice for applying ML, plus decision trees.", "hours": "8", "resources": [{"id": "w6-1", "name": "ML Spec C2 W3-4: ML Advice & Decision Trees (Coursera Plus)", "type": "Video", "time": "6 hrs", "link": "https://www.coursera.org/specializations/machine-learning-introduction", "notes": "Bias/variance, trees, ensembles"}, {"id": "w6-2", "name": "Apply: random forest on ADMET data", "type": "Project", "time": "2 hrs", "link": "https://www.ebi.ac.uk/chembl/", "notes": "Compare to your earlier models"}]}, {"week": 7, "phase": 2, "title": "Ng Course 3 \u2014 Unsupervised Learning", "description": "Course 3, Weeks 1-2: clustering and anomaly detection.", "hours": "8", "resources": [{"id": "w7-1", "name": "ML Spec C3 W1-2: Clustering & Anomaly Detection (Coursera Plus)", "type": "Video", "time": "5 hrs", "link": "https://www.coursera.org/specializations/machine-learning-introduction", "notes": "K-means, Gaussian models"}, {"id": "w7-2", "name": "Apply: cluster compounds + PCA visualization", "type": "Project", "time": "3 hrs", "link": "https://scikit-learn.org/stable/modules/clustering.html", "notes": "Find structure in molecular data"}]}, {"week": 8, "phase": 2, "title": "Consolidation + First Portfolio Piece", "description": "Finish Ng (skim recommenders/RL) and turn one project into a polished GitHub writeup.", "hours": "8", "resources": [{"id": "w8-1", "name": "ML Spec C3 W3: Recommenders & Intro RL (skim) (Coursera Plus)", "type": "Video", "time": "3 hrs", "link": "https://www.coursera.org/specializations/machine-learning-introduction", "notes": "Lighter \u2014 overview is fine"}, {"id": "w8-2", "name": "Portfolio: end-to-end ML on a drug dataset + README", "type": "Project", "time": "5 hrs", "link": "https://github.com/", "notes": "Clean notebook, clear writeup"}]}, {"week": 9, "phase": 3, "title": "fast.ai Lesson 1 \u2014 Build a Classifier", "description": "Top-down deep learning. You train a working model in lesson 1.", "hours": "8", "resources": [{"id": "w9-1", "name": "fast.ai Lesson 1: Getting Started", "type": "Video", "time": "3 hrs", "link": "https://course.fast.ai/Lessons/lesson1.html", "notes": "Watch + follow along"}, {"id": "w9-2", "name": "Run the lesson 1 notebook yourself", "type": "Project", "time": "3 hrs", "link": "https://course.fast.ai/", "notes": "Break it, fix it, tweak it"}, {"id": "w9-3", "name": "Set up Colab GPU / PyTorch environment", "type": "Blog Post", "time": "2 hrs", "link": "https://pytorch.org/get-started/locally/", "notes": "Make sure GPU works"}]}, {"week": 10, "phase": 3, "title": "fast.ai Lessons 2-3 \u2014 Production & SGD", "description": "Deploying a model and the foundations of stochastic gradient descent.", "hours": "8", "resources": [{"id": "w10-1", "name": "fast.ai Lessons 2-3", "type": "Video", "time": "5 hrs", "link": "https://course.fast.ai/", "notes": "Deployment + SGD from scratch"}, {"id": "w10-2", "name": "Practice notebook + small experiment", "type": "Project", "time": "3 hrs", "link": "https://course.fast.ai/", "notes": "Train on a dataset of your choice"}]}, {"week": 11, "phase": 3, "title": "fast.ai Lesson 4 \u2014 NLP & Transformers Intro", "description": "Sequence models. Light reading you can do at the beach.", "hours": "8", "resources": [{"id": "w11-1", "name": "fast.ai Lesson 4: NLP", "type": "Video", "time": "3 hrs", "link": "https://course.fast.ai/", "notes": "Fine-tuning language models"}, {"id": "w11-2", "name": "The Illustrated Transformer (beach reading)", "type": "Blog Post", "time": "1.5 hrs", "link": "https://jalammar.github.io/illustrated-transformer/", "notes": "Visual, no coding needed"}, {"id": "w11-3", "name": "\"Attention Is All You Need\" \u2014 skim (beach reading)", "type": "Paper", "time": "1.5 hrs", "link": "https://arxiv.org/abs/1706.03762", "notes": "Don't sweat every equation"}, {"id": "w11-4", "name": "Practice: fine-tune a small model", "type": "Project", "time": "2 hrs", "link": "https://huggingface.co/docs/transformers/", "notes": "Hugging Face quickstart"}]}, {"week": 12, "phase": 3, "title": "fast.ai Lessons 5-6 \u2014 Tabular & Collaborative", "description": "Tabular data is exactly how molecular descriptor datasets look \u2014 very relevant to you.", "hours": "8", "resources": [{"id": "w12-1", "name": "fast.ai Lessons 5-6: Tabular & Collaborative Filtering", "type": "Video", "time": "5 hrs", "link": "https://course.fast.ai/", "notes": "Neural nets on structured data"}, {"id": "w12-2", "name": "Apply: deep model on molecular descriptors", "type": "Project", "time": "3 hrs", "link": "https://www.rdkit.org/docs/", "notes": "Compare vs your Ng-era models"}]}, {"week": 13, "phase": 3, "title": "fast.ai Lesson 7 + Molecular Deep Learning", "description": "Wrap fast.ai and point it at molecules with DeepChem.", "hours": "8", "resources": [{"id": "w13-1", "name": "fast.ai Lesson 7", "type": "Video", "time": "3 hrs", "link": "https://course.fast.ai/", "notes": "Advanced architectures"}, {"id": "w13-2", "name": "DeepChem intro + tutorial", "type": "Blog Post", "time": "2 hrs", "link": "https://deepchem.io/", "notes": "Purpose-built for drug discovery"}, {"id": "w13-3", "name": "Project: neural net for molecular property", "type": "Project", "time": "3 hrs", "link": "https://moleculenet.org/", "notes": "Use a MoleculeNet benchmark"}]}, {"week": 14, "phase": 3, "title": "PyTorch Consolidation", "description": "Solidify PyTorch so you're not dependent on fast.ai's wrappers.", "hours": "8", "resources": [{"id": "w14-1", "name": "PyTorch essentials tutorials", "type": "Blog Post", "time": "3 hrs", "link": "https://pytorch.org/tutorials/beginner/basics/intro.html", "notes": "Tensors, autograd, training loop"}, {"id": "w14-2", "name": "Rebuild a model from scratch in raw PyTorch", "type": "Project", "time": "3 hrs", "link": "https://pytorch.org/tutorials/", "notes": "No high-level wrappers"}, {"id": "w14-3", "name": "Portfolio writeup of your best DL project", "type": "Project", "time": "2 hrs", "link": "https://github.com/", "notes": "Second polished GitHub piece"}]}, {"week": 15, "phase": 4, "title": "Molecular Representations + RDKit", "description": "How molecules become numbers \u2014 the core skill for drug-discovery ML.", "hours": "8", "resources": [{"id": "w15-1", "name": "RDKit Getting Started", "type": "Blog Post", "time": "2 hrs", "link": "https://www.rdkit.org/docs/GettingStarted.html", "notes": "SMILES, mols, basic ops"}, {"id": "w15-2", "name": "Fingerprints & descriptors deep dive", "type": "Blog Post", "time": "2 hrs", "link": "https://www.rdkit.org/docs/", "notes": "Morgan, MACCS, Tanimoto"}, {"id": "w15-3", "name": "Project: featurize molecules, compare representations", "type": "Project", "time": "4 hrs", "link": "https://moleculenet.org/", "notes": "Which features predict best?"}]}, {"week": 16, "phase": 4, "title": "Protein Language Models", "description": "AlphaFold and ESM \u2014 the models behind modern computational biology.", "hours": "8", "resources": [{"id": "w16-1", "name": "AlphaFold overview", "type": "Blog Post", "time": "1.5 hrs", "link": "https://alphafold.ebi.ac.uk/", "notes": "What it does and why it mattered"}, {"id": "w16-2", "name": "ESM protein language models (paper + repo)", "type": "Paper", "time": "2.5 hrs", "link": "https://github.com/facebookresearch/esm", "notes": "Embeddings for proteins"}, {"id": "w16-3", "name": "Project: use ESM embeddings for a prediction task", "type": "Project", "time": "4 hrs", "link": "https://github.com/facebookresearch/esm", "notes": "Feed embeddings into an ML model"}]}, {"week": 17, "phase": 4, "title": "Graph Neural Networks", "description": "Molecules are graphs. GNNs are state-of-the-art for property prediction.", "hours": "8", "resources": [{"id": "w17-1", "name": "PyTorch Geometric intro", "type": "Blog Post", "time": "2.5 hrs", "link": "https://pytorch-geometric.readthedocs.io/", "notes": "Message passing, graph convs"}, {"id": "w17-2", "name": "GNNs for molecules (MoleculeNet)", "type": "Blog Post", "time": "1.5 hrs", "link": "https://moleculenet.org/", "notes": "Benchmarks and baselines"}, {"id": "w17-3", "name": "Project: build a GNN for property prediction", "type": "Project", "time": "4 hrs", "link": "https://pytorch-geometric.readthedocs.io/", "notes": "Compare to fingerprint models"}]}, {"week": 18, "phase": 4, "title": "Generative Models + Capstone", "description": "Generate novel molecules and ship a final portfolio project.", "hours": "8", "resources": [{"id": "w18-1", "name": "Variational Autoencoders intro", "type": "Blog Post", "time": "1.5 hrs", "link": "https://towardsdatascience.com/intuitively-understanding-variational-autoencoders-1bfe67eb5daf", "notes": "Encoder/decoder, latent space"}, {"id": "w18-2", "name": "Generative models for drug discovery (survey, beach reading)", "type": "Paper", "time": "1.5 hrs", "link": "https://arxiv.org/abs/1903.07293", "notes": "Big-picture of the field"}, {"id": "w18-3", "name": "Capstone: molecule generation or final portfolio project", "type": "Project", "time": "5 hrs", "link": "https://github.com/", "notes": "Your headline GitHub project"}]}], "notion": "https://app.notion.com/p/5ba48240dc1e41d68d5e11bd58bc21e1"};

const typeColor = {
  "Video":"bg-blue-100 text-blue-700",
  "Paper":"bg-purple-100 text-purple-700",
  "Project":"bg-green-100 text-green-700",
  "Blog Post":"bg-orange-100 text-orange-700",
  "Dataset":"bg-pink-100 text-pink-700",
};
const phaseAccent = ["border-sky-400","border-indigo-400","border-emerald-400","border-rose-400"];

const STORE_KEY = "ddai_progress_v2";
function loadProgress(){ try { return JSON.parse(localStorage.getItem(STORE_KEY)||"{}"); } catch(e){ return {}; } }
function saveProgress(p){ try { localStorage.setItem(STORE_KEY, JSON.stringify(p)); } catch(e){} }

let progress = loadProgress();
let openWeek = 1;

const totalResources = DATA.weeks.reduce((s,w)=>s+w.resources.length,0);

function done(){ return Object.values(progress).filter(Boolean).length; }

function render(){
  const root = document.getElementById("root");
  const pct = Math.round(done()/totalResources*100);

  let html = `
    <div class="mb-6">
      <h1 class="text-3xl font-bold text-slate-800 mb-1">Grace's Drug Discovery AI Plan</h1>
      <p class="text-slate-500 mb-4">18 weeks &bull; ~8 hours/week &bull; all free (Coursera Plus through Sept 15)</p>
      <div class="bg-white rounded-xl p-4 shadow-sm">
        <div class="flex justify-between text-sm mb-2">
          <span class="font-semibold text-slate-700">Progress</span>
          <span class="text-slate-500">${done()}/${totalResources} done</span>
        </div>
        <div class="w-full bg-slate-200 rounded-full h-2.5">
          <div class="bg-indigo-600 h-2.5 rounded-full fade" style="width:${pct}%"></div>
        </div>
        <p class="text-xs text-slate-400 mt-2">${pct}% complete</p>
      </div>
      <a href="${DATA.notion}" target="_blank" rel="noopener"
         class="mt-3 inline-flex items-center gap-1 text-sm text-indigo-600 hover:text-indigo-800 font-medium">
         Take notes in Notion &rarr;
      </a>
    </div>
  `;

  let lastPhase = null;
  DATA.weeks.forEach(w => {
    if (w.phase !== lastPhase){
      lastPhase = w.phase;
      const p = DATA.phases[w.phase-1];
      html += `<div class="mt-6 mb-2">
        <h2 class="text-xs font-bold uppercase tracking-wide text-slate-400">${p.name} &middot; ${p.weeks}</h2>
        <p class="text-xs text-slate-400">${p.desc}</p>
      </div>`;
    }
    const wkDone = w.resources.filter(r=>progress[r.id]).length;
    const accent = phaseAccent[w.phase-1];
    const isOpen = openWeek === w.week;
    html += `
      <div class="bg-white rounded-xl shadow-sm mb-2 overflow-hidden border-l-4 ${accent}">
        <button data-week="${w.week}" class="weekBtn w-full text-left p-4 hover:bg-slate-50 fade flex items-center justify-between">
          <div>
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-semibold text-slate-800">Week ${w.week}: ${w.title}</span>
              <span class="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full">${wkDone}/${w.resources.length}</span>
              <span class="text-xs text-slate-400">~${w.hours} hrs</span>
            </div>
            <p class="text-sm text-slate-500 mt-1">${w.description}</p>
          </div>
          <span class="text-slate-400 ml-3">${isOpen?"&#9650;":"&#9660;"}</span>
        </button>
        ${isOpen ? `<div class="px-4 pb-4 space-y-2">` + w.resources.map(r=>{
          const checked = !!progress[r.id];
          return `
            <div class="flex items-start gap-3 p-3 rounded-lg ${checked?'bg-green-50':'bg-slate-50'} fade">
              <input type="checkbox" data-id="${r.id}" class="resChk mt-1 w-5 h-5 accent-indigo-600 cursor-pointer" ${checked?'checked':''}/>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="font-medium text-sm ${checked?'line-through text-slate-400':'text-slate-800'}">${r.name}</span>
                  <span class="text-xs px-2 py-0.5 rounded-full ${typeColor[r.type]||'bg-slate-100 text-slate-600'}">${r.type}</span>
                </div>
                <p class="text-xs text-slate-500 mt-0.5">${r.notes}</p>
                <div class="flex items-center gap-3 mt-1">
                  <span class="text-xs text-slate-400">${r.time}</span>
                  <a href="${r.link}" target="_blank" rel="noopener" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium">Open &rarr;</a>
                </div>
              </div>
            </div>`;
        }).join("") + `</div>` : ""}
      </div>`;
  });

  html += `<p class="text-center text-xs text-slate-400 mt-6">Progress saves in this browser on this device. Notes live in Notion.</p>`;
  root.innerHTML = html;

  document.querySelectorAll(".weekBtn").forEach(b=>{
    b.addEventListener("click",()=>{ const wk=+b.dataset.week; openWeek = (openWeek===wk)?null:wk; render(); });
  });
  document.querySelectorAll(".resChk").forEach(c=>{
    c.addEventListener("change",()=>{ progress[c.dataset.id]=c.checked; saveProgress(progress); render(); });
  });
}
render();
</script>
</body>
</html>
